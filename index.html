<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Physics Bike Game - Matter.js</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: sans-serif; }
        #ui {
            position: absolute; top: 10px; left: 10px;
            color: white; text-shadow: 2px 2px 2px #000;
            pointer-events: none; width: 100%;
        }
        .gauge-container { width: 200px; height: 20px; background: #333; border: 2px solid #fff; }
        #energy-bar { width: 100%; height: 100%; background: #0f0; transition: width 0.1s; }
        #controls {
            position: absolute; bottom: 20px; width: 100%;
            display: flex; justify-content: space-around;
        }
        .btn {
            width: 80px; height: 80px; background: rgba(255,255,255,0.5);
            border-radius: 50%; display: flex; align-items: center;
            justify-content: center; font-weight: bold; user-select: none;
        }
    </style>
</head>
<body>

<div id="ui">
    <div>体力 <div class="gauge-container"><div id="energy-bar"></div></div></div>
    <div style="margin-top:5px;">スコア: <span id="score">0</span></div>
</div>

<div id="controls">
    <div class="btn" id="btn-back">BACK</div>
    <div class="btn" id="btn-drive">DRIVE</div>
</div>

<script>
const { Engine, Render, Runner, World, Bodies, Composite, Constraint, Mouse, Vector } = Matter;

// --- 設定 ---
const engine = Engine.create();
const world = engine.world;
const render = Render.create({
    element: document.body,
    engine: engine,
    options: {
        width: window.innerWidth,
        height: window.innerHeight,
        wireframes: false,
        background: 'transparent'
    }
});

// --- バイクの生成 (サスペンション構造) ---
function createBike(x, y) {
    const group = Matter.Body.nextGroup(true);
    
    // ボディ
    const body = Bodies.rectangle(x, y, 60, 20, { 
        collisionFilter: { group: group },
        chamfer: { radius: 10 },
        render: { fillStyle: '#555' }
    });

    // タイヤ
    const wheelA = Bodies.circle(x - 30, y + 25, 20, { 
        collisionFilter: { group: group },
        friction: 0.8,
        render: { fillStyle: '#222' }
    });
    const wheelB = Bodies.circle(x + 30, y + 25, 20, { 
        collisionFilter: { group: group },
        friction: 0.8,
        render: { fillStyle: '#222' }
    });

    // サスペンション (バネ制約)
    const axelA = Constraint.create({
        bodyA: body, pointA: { x: -30, y: 10 },
        bodyB: wheelA,
        stiffness: 0.1, damping: 0.1,
        render: { visible: false }
    });
    const axelB = Constraint.create({
        bodyA: body, pointA: { x: 30, y: 10 },
        bodyB: wheelB,
        stiffness: 0.1, damping: 0.1,
        render: { visible: false }
    });

    Composite.add(world, [body, wheelA, wheelB, axelA, axelB]);
    return { body, wheelA, wheelB };
}

const bike = createBike(200, 100);

// --- 起伏のある地形生成 ---
const terrainPoints = [];
const startX = -500;
const segmentWidth = 40;
for (let i = 0; i < 200; i++) {
    const x = startX + i * segmentWidth;
    // サイン波を組み合わせて複雑な地形を作成
    const y = 500 + Math.sin(i * 0.2) * 50 + Math.sin(i * 0.05) * 100;
    terrainPoints.push({ x, y });
}

for (let i = 0; i < terrainPoints.length - 1; i++) {
    const p1 = terrainPoints[i];
    const p2 = terrainPoints[i+1];
    const dx = p2.x - p1.x;
    const dy = p2.y - p1.y;
    const distance = Math.sqrt(dx*dx + dy*dy);
    const angle = Math.atan2(dy, dx);

    const groundSegment = Bodies.rectangle(
        p1.x + dx/2, p1.y + dy/2, 
        distance + 2, 40, 
        { 
            isStatic: true, 
            angle: angle,
            render: { fillStyle: '#4d3319' } 
        }
    );
    Composite.add(world, groundSegment);
}

// --- ループ処理 & カメラ追従 ---
let score = 0;
let energy = 100;
const energyBar = document.getElementById('energy-bar');
const scoreLabel = document.getElementById('score');

let keys = {};
window.addEventListener('keydown', e => keys[e.code] = true);
window.addEventListener('keyup', e => keys[e.code] = false);

// スマホ操作用
const btnDrive = document.getElementById('btn-drive');
const btnBack = document.getElementById('btn-back');
let touchDrive = false, touchBack = false;
btnDrive.addEventListener('touchstart', () => touchDrive = true);
btnDrive.addEventListener('touchend', () => touchDrive = false);
btnBack.addEventListener('touchstart', () => touchBack = true);
btnBack.addEventListener('touchend', () => touchBack = false);

Matter.Events.on(engine, 'beforeUpdate', () => {
    const isGrounded = Math.abs(bike.wheelA.velocity.y) < 0.5 || Math.abs(bike.wheelB.velocity.y) < 0.5;

    // 前進 (DRIVE)
    if (keys['ArrowRight'] || touchDrive) {
        Matter.Body.setAngularVelocity(bike.wheelB, 0.2);
        if (!isGrounded) Matter.Body.rotate(bike.body, 0.05); // 空中前転
    }
    // 後退・ブレーキ (BACK)
    if (keys['ArrowLeft'] || touchBack) {
        Matter.Body.setAngularVelocity(bike.wheelB, -0.1);
        if (!isGrounded) Matter.Body.rotate(bike.body, -0.05); // 空中後転
    }

    // カメラ追従 (車を常に画面の左側に配置)
    const targetX = bike.body.position.x - 200;
    Render.lookAt(render, {
        min: { x: targetX, y: bike.body.position.y - 400 },
        max: { x: targetX + window.innerWidth, y: bike.body.position.y + 400 }
    });

    // スコアと体力の更新
    if (bike.body.position.x > score) {
        score = Math.floor(bike.body.position.x);
        scoreLabel.innerText = score;
    }
    
    energy -= 0.01; // 徐々に減る
    energyBar.style.width = Math.max(0, energy) + "%";
});

Render.run(render);
const runner = Runner.create();
Runner.run(runner, engine);
</script>
</body>
</html>

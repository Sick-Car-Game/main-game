<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Extreme Hill Climb - Fixed</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: linear-gradient(#87CEEB, #E0F6FF); font-family: 'Arial', sans-serif; touch-action: none; }
        #ui {
            position: absolute; top: 20px; left: 20px; color: #222;
            background: rgba(255, 255, 255, 0.8); padding: 15px; border-radius: 10px;
            pointer-events: none; box-shadow: 0 4px 6px rgba(0,0,0,0.1); z-index: 100;
        }
        .gauge-container { width: 180px; height: 12px; background: #444; border-radius: 6px; overflow: hidden; margin-top: 5px; }
        #energy-bar { width: 100%; height: 100%; background: #0f0; transition: width 0.1s; }
        #controls {
            position: absolute; bottom: 40px; width: 100%;
            display: flex; justify-content: space-around; z-index: 100;
        }
        .btn {
            width: 90px; height: 90px; background: rgba(0,0,0,0.4); color: white;
            border: 3px solid white; border-radius: 50%; display: flex; 
            align-items: center; justify-content: center; font-weight: bold; 
            user-select: none; -webkit-tap-highlight-color: transparent;
        }
        .btn:active { background: rgba(0,0,0,0.7); transform: scale(0.9); }
    </style>
</head>
<body>

<div id="ui">
    <div>FUEL <div class="gauge-container"><div id="energy-bar"></div></div></div>
    <div style="font-size: 20px; font-weight: bold; margin-top:8px;">SCORE: <span id="score">0</span> m</div>
</div>

<div id="controls">
    <div class="btn" id="btn-back">BACK</div>
    <div class="btn" id="btn-drive">DRIVE</div>
</div>

<script>
const { Engine, Render, Runner, World, Bodies, Composite, Constraint, Vector, Events } = Matter;

const engine = Engine.create();
const world = engine.world;
// 重力を少し強めにして「おっとっと」感を出す
engine.gravity.y = 1.2;

const render = Render.create({
    element: document.body,
    engine: engine,
    options: {
        width: window.innerWidth,
        height: window.innerHeight,
        wireframes: false,
        background: 'transparent'
    }
});

// --- バイク生成 (さらにサスペンションを強化) ---
function createBike(x, y) {
    const group = Matter.Body.nextGroup(true);
    
    // ボディ（見えないが判定用）
    const frame = Bodies.rectangle(x, y, 50, 15, { 
        collisionFilter: { group: group }, 
        frictionAir: 0.02,
        render: { visible: false } 
    });

    // タイヤを大きくして走破性を上げる
    const wheelA = Bodies.circle(x - 45, y + 25, 30, { 
        collisionFilter: { group: group }, 
        friction: 1.0, 
        render: { fillStyle: '#111' } 
    });
    const wheelB = Bodies.circle(x + 45, y + 25, 30, { 
        collisionFilter: { group: group }, 
        friction: 1.0, 
        render: { fillStyle: '#111' } 
    });

    // 極限まで柔らかいサスペンション
    const susProps = { stiffness: 0.03, damping: 0.05, render: { visible: false } };
    const springA = Constraint.create({ bodyA: frame, pointA: { x: -25, y: 0 }, bodyB: wheelA, ...susProps });
    const springB = Constraint.create({ bodyA: frame, pointA: { x: 25, y: 0 }, bodyB: wheelB, ...susProps });

    Composite.add(world, [frame, wheelA, wheelB, springA, springB]);
    return { frame, wheelA, wheelB };
}

const bike = createBike(200, 300);

// --- エグい地形 & GASアイテム生成 ---
let lastX = -500;
let fuels = [];

function addTerrain(startX, count) {
    const segWidth = 50;
    for (let i = 0; i < count; i++) {
        const x = startX + i * segWidth;
        const diff = x / 3000; // 進むほどエグくなる係数
        
        const getY = (px) => {
            return 600 + 
                Math.sin(px * 0.008) * (120 + diff * 50) + // 大きなうねり
                Math.sin(px * 0.04) * (40 + diff * 30) +   // 中くらいの凸凹
                Math.cos(px * 0.15) * 15;                  // 小さなガタガタ
        };

        const y1 = getY(x);
        const y2 = getY(x + segWidth);
        const angle = Math.atan2(y2 - y1, segWidth);

        const ground = Bodies.rectangle(x + segWidth/2, y1 + (y2-y1)/2 + 50, segWidth + 5, 120, {
            isStatic: true, angle: angle, friction: 1.0,
            render: { fillStyle: '#2d5a27', strokeStyle: '#1b3a18', lineWidth: 1 }
        });
        Composite.add(world, ground);

        // GASアイテムを20セグメントごとに配置
        if (i % 20 === 0 && i > 5) {
            const fuel = Bodies.rectangle(x, y1 - 80, 35, 45, {
                isStatic: true, isSensor: true,
                render: { fillStyle: '#ff3333', strokeStyle: '#fff', lineWidth: 3 }
            });
            fuels.push(fuel);
            Composite.add(world, fuel);
        }
        lastX = x + segWidth;
    }
}

addTerrain(lastX, 100);

// --- フレームのビジュアル描画 ---
Events.on(render, 'afterRender', () => {
    const ctx = render.context;
    const f = bike.frame.position, wA = bike.wheelA.position, wB = bike.wheelB.position;

    // バイクフレーム
    ctx.beginPath();
    ctx.strokeStyle = "#444"; ctx.lineWidth = 7; ctx.lineCap = "round";
    ctx.moveTo(wA.x, wA.y); ctx.lineTo(f.x, f.y); // リア
    ctx.lineTo(f.x + 25, f.y - 15); ctx.lineTo(wB.x, wB.y); // フロント
    ctx.moveTo(f.x, f.y); ctx.lineTo(f.x - 10, f.y - 40); // サドル支柱
    ctx.moveTo(f.x + 18, f.y - 10); ctx.lineTo(f.x + 28, f.y - 50); // ハンドル支柱
    ctx.stroke();

    // サドルとハンドルバー
    ctx.fillStyle = "#222";
    ctx.fillRect(f.x - 25, f.y - 45, 25, 10); // サドル
    ctx.fillRect(f.x + 18, f.y - 55, 25, 8);  // ハンドル

    // GASラベル
    ctx.fillStyle = "white"; ctx.font = "bold 14px Arial"; ctx.textAlign = "center";
    fuels.forEach(fuel => {
        if(fuel.id) ctx.fillText("GAS", fuel.position.x, fuel.position.y + 5);
    });
});

// --- ゲームロジック ---
let stamina = 100;
let score = 0;
let isDriving = false;
let isBacking = false;

Events.on(engine, 'beforeUpdate', () => {
    // 地形を無限に追加
    if (bike.frame.position.x > lastX - 3000) addTerrain(lastX, 50);

    // 操作と空中姿勢制御
    const speed = 0.22;
    const rotPower = 0.12;
    if (isDriving) {
        Matter.Body.setAngularVelocity(bike.wheelB, speed);
        Matter.Body.setAngularVelocity(bike.wheelA, speed);
        bike.frame.torque = rotPower; // 前傾
    }
    if (isBacking) {
        Matter.Body.setAngularVelocity(bike.wheelB, -speed * 0.6);
        bike.frame.torque = -rotPower; // 後傾
    }

    // カメラ：車を画面中央より少し左に配置
    Render.lookAt(render, bike.frame, { x: 300, y: 300 });

    // スコアとスタミナ
    stamina -= 0.015;
    if (stamina <= 0) location.reload(); // 燃料切れでリスタート

    // アイテム取得 (Vector.distanceを使用)
    fuels.forEach((fuel, i) => {
        if (Vector.magnitude(Vector.sub(bike.frame.position, fuel.position)) < 70) {
            stamina = Math.min(100, stamina + 50); // 回復
            Composite.remove(world, fuel);
            fuels.splice(i, 1);
        }
    });

    document.getElementById('energy-bar').style.width = stamina + "%";
    document.getElementById('energy-bar').style.background = stamina < 30 ? "#f00" : "#0f0";
    score = Math.max(score, Math.floor(bike.frame.position.x / 10));
    document.getElementById('score').innerText = score;
});

// ボタンイベント設定 (マルチタッチ対応)
const setupBtn = (id, action) => {
    const el = document.getElementById(id);
    const start = (e) => { e.preventDefault(); action(true); };
    const end = (e) => { e.preventDefault(); action(false); };
    el.addEventListener('touchstart', start); el.addEventListener('touchend', end);
    el.addEventListener('mousedown', start); el.addEventListener('mouseup', end);
};
setupBtn('btn-drive', (v) => isDriving = v);
setupBtn('btn-back', (v) => isBacking = v);

// ウィンドウリサイズ対応
window.addEventListener('resize', () => {
    render.canvas.width = window.innerWidth;
    render.canvas.height = window.innerHeight;
});

Render.run(render);
Runner.run(Runner.create(), engine);
</script>
</body>
</html>
